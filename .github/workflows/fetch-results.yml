name: Fetch Race Results (FastF1)

# ── Triggers ──────────────────────────────────────────────────────────────────
#
# 1. Scheduled: update the cron below to ~4 hours after each race start (UTC).
#    Format: 'minute hour day month *'
#    Example: Miami/RaceIQ Round 6 starts 20:00 UTC on 3 May → trigger at 00:00 UTC on 4 May.
#
# 2. Manual: run from the Actions tab at any time, specifying year + round.
#
on:
  schedule:
    - cron: '0 0 4 5 *'     # RaceIQ Round 6: Miami 2026, 4h after May 3 race start (UTC)

  workflow_dispatch:
    inputs:
      year:
        description: 'F1 season year'
        required: true
        default: '2026'
      round:
        description: 'Race round number'
        required: true
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  fetch-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: f1-raceiq/fastf1/fastf1_cache
          key: fastf1-cache-${{ github.event.inputs.year || '2026' }}-r${{ github.event.inputs.round || '6' }}
          restore-keys: |
            fastf1-cache-${{ github.event.inputs.year || '2026' }}-

      - name: Install dependencies
        run: pip install fastf1 pandas google-auth google-api-python-client

      - name: Fetch and upload results
        env:
          F1_YEAR:                    ${{ github.event.inputs.year  || '2026' }}
          F1_ROUND:                   ${{ github.event.inputs.round || '6' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          cd f1-raceiq/fastf1
          python fastf1-sheets.py
